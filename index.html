<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Sharkbid Portal - Multi-tenant business-to-vendor matching platform" />
    <meta name="theme-color" content="#0f1419" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sharkbid" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="https://cdn.builder.io/api/v1/image/assets%2Fd51db21242644bff87f6c68e2397daf7%2Fc18fe842220b49a281d4e25d59dee47a?format=webp&width=100&height=100" />
    <title>Sharkbid Portal</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/client/main.tsx"></script>

    <script>
      // Register service worker (disabled in Builder preview to avoid unexpected reloads)
      if ("serviceWorker" in navigator) {
        const host = window.location.hostname;
        const isLocalhost = host === "localhost" || host === "127.0.0.1";
        const isBuilderPreview = host.endsWith("builderio.xyz");

        if (!isLocalhost && !isBuilderPreview) {
          window.addEventListener("load", () => {
            navigator.serviceWorker
              .register("/service-worker.js")
              .then((registration) => {
                console.log("Service Worker registered:", registration);
                // Note: Avoid aggressive update polling; it can feel like the app is 'refreshing'.
              })
              .catch((error) => {
                console.log("Service Worker registration failed:", error);
              });
          });

          // Handle service worker updates
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            console.log("New Service Worker activated");
          });
        }
      }
    </script>
  </body>
</html>
